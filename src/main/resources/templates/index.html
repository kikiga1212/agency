<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}"><head>
    <!-- layout:decorate="~{layouts/layout}" : 공통 레이아웃을 불러옴(재사용성)-->
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div layout:fragment="content"><!-- 콘텐츠 치환 : 내부에 작성된 내용만 실제 본문 영역에 맞춰진다 -->
    <!-- 본문 내용-->
    <header class="masthead">
        <div class="container">
            <div class="masthead-subheading">Welcome To Our Studio!</div>
            <div class="masthead-heading text-uppercase">It's Nice To Meet You</div>
            <a class="btn btn-primary btn-xl text-uppercase" href="#services">Tell Me More</a>
        </div>
    </header>
    <!-- Services-->
    <section class="page-section" id="services">
        <div class="container">
            <div class="text-center">
                <h2 class="section-heading text-uppercase">Services</h2>
                <h3 class="section-subheading text-muted">우리가 제공하는 서비스입니다.</h3>
            </div>
            <div class="row text-center">
                <!-- th:each 를 사용하여 리스트만큼 반복 생성 -->
                <div class="col-md-4" th:each="service : ${serviceList}">
                <span class="fa-stack fa-4x">
                    <i class="fas fa-circle fa-stack-2x text-primary"></i>
                    <!-- 클래스명을 변수로 처리 -->
                    <i class="fas fa-stack-1x fa-inverse" th:classappend="${service.icon}"></i>
                </span>
                    <h4 class="my-3" th:text="${service.title}">서비스 제목</h4>
                    <p class="text-muted" th:text="${service.desc}">서비스 상세 설명</p>
                </div>
            </div>
        </div>
    </section>
    <!-- 본문 내용 끝 -->
</div>

</body>
</html>
